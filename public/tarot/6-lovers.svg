<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="50%" stop-color="#e8d4a8"/>
      <stop offset="100%" stop-color="#dcc89c"/>
    </linearGradient>
    <linearGradient id="arch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6b4f10"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>
  <!-- 主边框 -->
  <rect x="2" y="2" width="276" height="416" rx="8" fill="url(#bg)" stroke="#6b4f10" stroke-width="2.5"/>
  <rect x="6" y="6" width="268" height="408" rx="6" fill="none" stroke="#8b6914" stroke-width="0.8" opacity="0.2"/>
  
  <!-- 哥特式拱门内框 -->
  <path d="M14 380 L14 100 Q140 20 266 100 L266 380 Z" fill="none" stroke="#8b6914" stroke-width="1.2" opacity="0.5"/>
  <path d="M18 376 L18 105 Q140 28 262 105 L262 376 Z" fill="none" stroke="#6b4f10" stroke-width="0.5" opacity="0.18"/>

  <!-- 四角哥特装饰 -->
  <g opacity="0.5">
    <path d="M10 10 L25 10 L10 25 Z" fill="#8b6914"/>
    <path d="M270 10 L255 10 L270 25 Z" fill="#8b6914"/>
    <path d="M10 410 L25 410 L10 395 Z" fill="#8b6914"/>
    <path d="M270 410 L255 410 L270 395 Z" fill="#8b6914"/>
  </g>

  <!-- 编号 - 左上 中世纪风格 -->
  <text x="22" y="390" font-size="11" font-family="serif" fill="#2c1810" font-weight="bold" opacity="0.7" letter-spacing="2">VI</text>
  <!-- 编号 - 右下 -->
  <text x="258" y="390" text-anchor="end" font-size="11" font-family="serif" fill="#2c1810" font-weight="bold" opacity="0.7" letter-spacing="2">VI</text>

  <!-- 中世纪插画区域 -->
  <g transform="translate(140,170) scale(1.6)">
    <!-- 恋人 - 中世纪婚礼 -->
      <rect x="-55" y="-80" width="110" height="140" rx="8" fill="#2c1810" opacity="0.18"/>
      <!-- 天使 -->
      <circle cx="0" cy="-45" r="12" fill="none" stroke="#8b6914" stroke-width="0.6" opacity="0.55"/>
      <path d="M-10 -40 L-15 -55 M10 -40 L15 -55" stroke="#8b6914" stroke-width="1" opacity="0.18"/>
      <!-- 新人 -->
      <circle cx="-20" cy="-10" r="8" fill="#f0d8a0" opacity="0.55"/>
      <path d="M-28 -2 Q-20 -2 -12 -2 L-10 15 L-30 15 Z" fill="#c0392b" opacity="0.55"/>
      <circle cx="20" cy="-10" r="8" fill="#f0d8a0" opacity="0.55"/>
      <path d="M12 -2 Q20 -2 28 -2 L30 15 L10 15 Z" fill="#2980b9" opacity="0.55"/>
      <!-- 树 -->
      <line x1="-40" y1="-20" x2="-40" y2="20" stroke="#6b4f10" stroke-width="2" opacity="0.18"/>
      <circle cx="-40" cy="-25" r="10" fill="#27ae60" opacity="0.15"/>
      <line x1="40" y1="-20" x2="40" y2="20" stroke="#6b4f10" stroke-width="2" opacity="0.18"/>
      <!-- 太阳 -->
      <circle cx="35" cy="-55" r="10" fill="#f1c40f" opacity="0.2"/>
  </g>

  <!-- 名称 - 中世纪字体风格 -->
  <text x="140" y="374" text-anchor="middle" font-size="16" font-family="serif" fill="#2c1810" font-weight="bold" letter-spacing="3">L'AMOUREUX</text>
  <text x="140" y="394" text-anchor="middle" font-size="12" font-family="serif" fill="#8b6914" letter-spacing="2">The Lovers</text>
  <text x="140" y="410" text-anchor="middle" font-size="9" font-family="serif" fill="#6b4f10" opacity="0.7" font-style="italic" letter-spacing="1">VI — Choix</text>
  
  <!-- 底部 -->
  <text x="140" y="416" text-anchor="middle" font-size="5.5" font-family="serif" fill="#8b6914" opacity="0.55" letter-spacing="1">VI • L'Amour • Décision</text>
</svg>